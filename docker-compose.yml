version: "3.9"

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./outputs:/app/outputs
      - ./chroma_db:/app/chroma_db
      - /var/run/docker.sock:/var/run/docker.sock  # needed to spawn sandbox containers
    depends_on: []
    restart: unless-stopped

  # The sandbox image is pre-built so the first code execution is fast
  sandbox:
    build:
      context: docker/
      dockerfile: sandbox.Dockerfile
    network_mode: none          # zero outbound network
    profiles:
      - build-only              # not started by `docker compose up`; pre-built only
